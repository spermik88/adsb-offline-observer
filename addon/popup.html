<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 15px; font-family: sans-serif; }
    h3 { margin-top: 0; }
    .control-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    select, input[type="file"], button { width: 100%; padding: 8px; box-sizing: border-box; }
    button { background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:disabled { background-color: #ccc; cursor: default; }
    button#stopBtn { background-color: #d93025; margin-top: 10px; display: none; }
    #status { margin-top: 15px; font-size: 12px; color: #555; white-space: pre-wrap; max-height: 150px; overflow-y: auto; border: 1px solid #eee; padding: 5px; }
    .template-list { border: 1px solid #eee; border-radius: 6px; overflow: hidden; }
    .template-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-top: 1px solid #eee; }
    .template-item:first-child { border-top: none; }
    .template-item.active { background: #f1f7ff; }
    .template-label { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .template-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .icon-btn { width: auto; padding: 4px 8px; background: transparent; color: #d93025; font-size: 16px; }
    .icon-btn:disabled { color: #999; background: transparent; }
    .empty-state { padding: 10px; font-size: 12px; color: #666; }
    .hint { margin-top: 6px; font-size: 12px; color: #666; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h3>Gmail Sender</h3>

  <div class="control-group">
    <label for="language">Язык рассылки:</label>
    <select id="language">
      <option value="es">Español</option>
      <option value="it">Italiano</option>
      <option value="en">English</option>
      <option value="de">Deutsch</option>
    </select>
  </div>

  <div class="control-group">
    <label>Загруженные файлы с текстом:</label>
    <div id="templateList" class="template-list">
      <div class="empty-state">Пока нет загруженных файлов.</div>
    </div>
    <div class="hint">Выберите файл, чтобы использовать его текст вместо шаблона выбранного языка.</div>
  </div>

  <div class="control-group">
    <label for="templateInput">Загрузить файл:</label>
    <input type="file" id="templateInput" accept=".txt">
  </div>

  <div class="control-group">
    <label for="fileInput">Файл получателей (validated*.txt):</label>
    <input type="file" id="fileInput" accept=".txt,.json">
  </div>

  <div id="stats" style="margin-bottom: 10px; font-size: 13px;">
    Загружено: <span id="count">0</span>
  </div>

  <button id="startBtn" disabled>Начать рассылку</button>
  <button id="stopBtn">Остановить</button>

  <div id="status">Готов к работе...</div>

  <script src="locales.js"></script>
  <script src="popup.js"></script>
</body>
</html>
