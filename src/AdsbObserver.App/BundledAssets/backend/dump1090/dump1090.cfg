#
# Portable bundled config for Dump1090 backend.
# Keep this file offline-safe: no automatic downloads, no Windows setup wizard.
#

aircrafts = NUL
airports = NUL
location = false
homepos = -1,-1
logfile = %~dp0\dump1090.log
logfile-daily = 0
interactive-ttl = 60
metric = true
tui = wincon
console-icon = false
freq = 1090.0M
gain = 31
samplerate = 2.4M
rtlsdr-ppm = 0
error-correct1 = true
error-correct2 = true
cpr-trace = false

# Network output
net-bo-port = 30005
net-ro-port = 30002
net-sbs-port = 30003
web-page = NUL
